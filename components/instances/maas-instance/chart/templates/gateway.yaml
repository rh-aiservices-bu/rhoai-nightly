apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: maas-default-gateway
  namespace: openshift-ingress
  annotations:
    opendatahub.io/managed: "false"
    security.opendatahub.io/authorino-tls-bootstrap: "true"
    argocd.argoproj.io/sync-wave: "1"
spec:
  gatewayClassName: openshift-default
  listeners:
    - name: http
      hostname: "maas.{{ required "clusterDomain is required" .Values.clusterDomain }}"
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      hostname: "maas.{{ .Values.clusterDomain }}"
      port: 443
      protocol: HTTPS
      allowedRoutes:
        namespaces:
          from: All
      tls:
        certificateRefs:
          - group: ""
            kind: Secret
            name: {{ .Values.certName }}
        mode: Terminate
