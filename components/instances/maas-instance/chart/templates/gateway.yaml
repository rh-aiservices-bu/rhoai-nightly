apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: maas-default-gateway
  namespace: openshift-ingress
  annotations:
    opendatahub.io/managed: "false"
    security.opendatahub.io/authorino-tls-bootstrap: "true"
    argocd.argoproj.io/sync-wave: "1"
spec:
  # Raise the auto-provisioned gateway proxy (envoy) memory. Istio's default
  # gateway-proxy limit is 1Gi, which OOMKills (exit 137, CrashLoopBackOff) when
  # Kuadrant programs its wasm-shim enforcement config (AuthPolicy +
  # TokenRateLimitPolicy) onto this gateway — observed on 3.5-ea.2 nightly. Envoy
  # settles at ~1.4Gi, so 2Gi gives headroom. The openshift.io gateway-controller
  # does NOT honor sidecar.istio.io/proxyMemoryLimit annotations for
  # auto-provisioned gateways; the supported knob is a parametersRef ConfigMap
  # whose `deployment` key strategic-merge-patches the generated Deployment
  # (see maas-gateway-options.yaml).
  infrastructure:
    parametersRef:
      group: ""
      kind: ConfigMap
      name: maas-default-gateway-options
  gatewayClassName: openshift-default
  listeners:
    - name: http
      hostname: "maas.{{ required "clusterDomain is required" .Values.clusterDomain }}"
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      hostname: "maas.{{ .Values.clusterDomain }}"
      port: 443
      protocol: HTTPS
      allowedRoutes:
        namespaces:
          from: All
      tls:
        certificateRefs:
          - group: ""
            kind: Secret
            name: {{ .Values.certName }}
        mode: Terminate
