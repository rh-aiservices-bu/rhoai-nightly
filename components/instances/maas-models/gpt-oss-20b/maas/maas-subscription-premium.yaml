apiVersion: maas.opendatahub.io/v1alpha1
kind: MaaSSubscription
metadata:
  name: gpt-oss-20b-premium
  namespace: models-as-a-service
  annotations:
    openshift.io/display-name: "gpt-oss-20b Premium Tier"
    openshift.io/description: "Premium tier: 10000 tokens/min for premium users"
spec:
  owner:
    groups:
      - name: system:authenticated
    users: []
  modelRefs:
    - name: gpt-oss-20b
      namespace: llm
      tokenRateLimits:
        - limit: 100000
          window: 1m
  priority: 20
