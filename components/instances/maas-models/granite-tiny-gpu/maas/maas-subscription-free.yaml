apiVersion: maas.opendatahub.io/v1alpha1
kind: MaaSSubscription
metadata:
  name: granite-tiny-gpu-free
  namespace: models-as-a-service
  annotations:
    openshift.io/display-name: "Granite Tiny GPU Free Tier"
    openshift.io/description: "Free tier: 100 tokens/min for all authenticated users"
spec:
  owner:
    groups:
      - name: system:authenticated
    users: []
  modelRefs:
    - name: granite-4-tiny-gpu
      namespace: llm
      tokenRateLimits:
        - limit: 100
          window: 1m
  priority: 10
