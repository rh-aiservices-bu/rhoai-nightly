kind: DataScienceCluster
apiVersion: datasciencecluster.opendatahub.io/v2
metadata:
  name: default-dsc
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: datasciencecluster
spec:
  components:
    aipipelines:
      managementState: Managed
    dashboard:
      managementState: Managed
    feastoperator:
      managementState: Managed
    kserve:
      managementState: Managed
      modelsAsService:
        managementState: Removed
      nim:
        managementState: Managed
      rawDeploymentServiceConfig: Headed
    kueue:
      defaultClusterQueueName: default
      defaultLocalQueueName: default
      managementState: Removed
    llamastackoperator:
      # Deprecated in RHOAI 3.5 — replaced by the ogx component (LlamaStack
      # backend for the Gen AI Studio Playground). Has no controller anymore;
      # leaving it Managed is a no-op AND blocks ogx from enabling, so it must
      # be Removed.
      managementState: Removed
    ogx:
      # Provides the LlamaStack operator + distribution that the Gen AI Studio
      # Playground chats through (odh-ogx-k8s-operator + RH LlamaStack
      # distribution). Without this the gen-ai BFF starts with an empty
      # LlamaStack url and the Playground tab does not appear.
      managementState: Managed
    mlflowoperator:
      managementState: Managed
    modelregistry:
      managementState: Managed
      registriesNamespace: rhoai-model-registries
    ray:
      managementState: Managed
    trainer:
      managementState: Managed
    trainingoperator:
      managementState: Managed
    trustyai:
      eval:
        lmeval:
          permitCodeExecution: deny
          permitOnline: deny
      managementState: Managed
    workbenches:
      managementState: Managed
      workbenchNamespace: rhods-notebooks
