apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Pinned RHOAI catalog overlay
# Uses a specific catalog image instead of floating nightly tag

resources:
  - ../../base

patches:
  - target:
      kind: CatalogSource
      name: rhoai-catalog-nightly
    patch: |-
      - op: replace
        path: /spec/image
        # Pinned to Apr 15 build (3.4 GA)
        value: quay.io/rhoai/rhoai-fbc-fragment:rhoai-3.4@sha256:febc5fe7709a7f5c69a941ab2786400cf20cb2cbfecc3e19e62ad449ab19c2be
