apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Pinned RHOAI catalog overlay
# Uses a specific catalog image instead of floating nightly tag

resources:
  - ../../base

patches:
  - target:
      kind: CatalogSource
      name: rhoai-catalog-nightly
    patch: |-
      - op: replace
        path: /spec/image
        # Pinned to Apr 29 nightly build (sha256:4c48f0c2)
        value: quay.io/rhoai/rhoai-fbc-fragment:rhoai-3.4@sha256:4c48f0c28f2f809bc7a097f6e7341dc1cad85262e02f716b087968211833cb6f
