apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Pinned RHOAI catalog overlay
# Uses a specific catalog image instead of floating nightly tag

resources:
  - ../../base

patches:
  - target:
      kind: CatalogSource
      name: rhoai-catalog-nightly
    patch: |-
      - op: replace
        path: /spec/image
        # Pinned to Apr 30 nightly build (sha256:35290f17)
        value: quay.io/rhoai/rhoai-fbc-fragment:rhoai-3.4@sha256:35290f177c77c16c6d34ea4a516766b4717378f05ca363965a7bcfe006df7cd0
