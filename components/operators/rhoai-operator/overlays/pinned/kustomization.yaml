apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Pinned RHOAI catalog overlay
# Uses a specific catalog image instead of floating nightly tag

resources:
  - ../../base

patches:
  - target:
      kind: CatalogSource
      name: rhoai-catalog-nightly
    patch: |-
      - op: replace
        path: /spec/image
        # Pinned to Mar 27 build (3.4 EA2)
        value: quay.io/rhoai/rhoai-fbc-fragment:rhoai-3.4-ea.2@sha256:878b1a8bc73ec4399dc2cd8afbb60758293b73c8bc51ecbf1661e7a1a3d616ff
