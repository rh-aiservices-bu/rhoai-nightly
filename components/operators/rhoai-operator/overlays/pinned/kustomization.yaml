apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Pinned RHOAI catalog overlay
# Uses a specific catalog image instead of floating nightly tag

resources:
  - ../../base

patches:
  - target:
      kind: CatalogSource
      name: rhoai-catalog-nightly
    patch: |-
      - op: replace
        path: /spec/image
        # Pinned to 3.5 EA2 nightly build - Jun 18, 2026 (sha256:005d7c6b)
        # Includes perses image 27553fd6 (fixes Observability dashboard crash; older a5c7fbfa shipped perses e797cdb4)
        value: quay.io/rhoai/rhoai-fbc-fragment:rhoai-3.5-ea.2-nightly@sha256:005d7c6b46e82e9f4866571beb2aa23d9bd65859bc16a486b72876c754d1a925
