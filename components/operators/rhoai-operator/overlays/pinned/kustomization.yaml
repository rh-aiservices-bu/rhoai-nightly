apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Pinned RHOAI catalog overlay
# Uses a specific catalog image instead of floating nightly tag

resources:
  - ../../base

patches:
  - target:
      kind: CatalogSource
      name: rhoai-catalog-nightly
    patch: |-
      - op: replace
        path: /spec/image
        # Pinned to Mar 11 build (3.4 EA2)
        value: quay.io/rhoai/rhoai-fbc-fragment:rhoai-3.4-ea.2@sha256:c0177f06608f4d2244c4998d5d4aaa5e377843226360b476f48a1f17fba06247
